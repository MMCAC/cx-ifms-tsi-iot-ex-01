<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Pessoa 2</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 20px auto; }
    #msgs { border: 1px solid #ccc; padding: 10px; height: 360px; overflow-y: auto; }
    .linha { margin: 6px 0; }
    .eu { font-weight: bold; }
    .topo { display:flex; justify-content:space-between; align-items:center; }
    input { width: 78%; padding: 8px; }
    button { padding: 9px 12px; }
  </style>
</head>
<body>
  <div class="topo">
    <h3>Chat - Pessoa 2</h3>
    <small id="status">offline</small>
  </div>

  <div id="msgs"></div>

  <div style="margin-top:10px; display:flex; gap:8px;">
    <input id="texto" placeholder="Digite..." onkeydown="if(event.key==='Enter') enviar()" />
    <button onclick="enviar()">Enviar</button>
  </div>

  <script>
    const EU = "Pessoa 2";
    let afterId = -1;

    function escapeHtml(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function addMsg(m) {
      const box = document.getElementById("msgs");
      const linha = document.createElement("div");
      linha.className = "linha";
      linha.innerHTML = `<span class="${m.de===EU?'eu':''}">${escapeHtml(m.de)}:</span> ${escapeHtml(m.texto)}`;
      box.appendChild(linha);
      box.scrollTop = box.scrollHeight;
    }

    async function enviar() {
      const input = document.getElementById("texto");
      const texto = input.value.trim();
      if (!texto) return;

      input.value = "";
      try {
        await fetch("/mensagens", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ de: EU, texto })
        });
      } catch (e) {}
    }

    async function receber() {
      try {
        const r = await fetch(`/mensagens?afterId=${afterId}`);
        const novas = await r.json();

        document.getElementById("status").textContent = "online";

        for (const m of novas) {
          addMsg(m);
          afterId = Math.max(afterId, m.id);
        }
      } catch (e) {
        document.getElementById("status").textContent = "offline";
      }
    }

    setInterval(receber, 800);
    receber();
  </script>
</body>
</html>
